line-length = 120

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade (modernize syntax)
    "B",      # flake8-bugbear (common bugs)
    "A",      # flake8-builtins (shadowing builtins)
    "S",      # flake8-bandit (security)
    "SIM",    # flake8-simplify
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez (naive datetime bugs)
    "PIE",    # flake8-pie (misc quality)
    "RET",    # flake8-return
    "PTH",    # flake8-use-pathlib
    "PERF",   # perflint
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line length (handled by line-length setting above)
    "S101",   # assert usage (fine outside prod)
    "S603",   # subprocess call (too noisy for scripting)
    "S607",   # partial executable path (too noisy)
    "RET504", # unnecessary assignment before return (readability choice)
    "PTH123", # open() vs Path.open() (too pedantic)
]

[lint.per-file-ignores]
"test_*.py" = ["S101"]
"*_test.py" = ["S101"]
